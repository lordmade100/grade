<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rare Grade Tech AI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* ══════════════════════════════════════════
       GEMINI-STYLE THEME SYSTEM
    ══════════════════════════════════════════ */
    :root {
        --bg-main: #FFFFFF;
        --bg-sidebar: #F0F4F9;
        --bg-input: #F0F4F9;
        --bg-user-msg: #F0F4F9;
        --text-primary: #1F1F1F;
        --text-secondary: #444746;
        --text-muted: #8E918F;
        --border-color: #E3E3E3;
        --brand-blue: #0611B1;
        --brand-red: #E63946;
        --gemini-gradient: linear-gradient(74deg, #4285f4 0, #9b72cb 9%, #d96570 20%, #d96570 24%, #9b72cb 35%, #4285f4 44%, #9b72cb 50%, #d96570 56%, #1F1F1F 75%, #1F1F1F 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      height: 100svh; 
      display: flex;
      overflow: hidden;
    }

    /* ════ SIDEBAR ════ */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .new-chat-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #E3E3E3;
      border: none;
      padding: 12px 16px;
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      width: fit-content;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: #D3D3D3; }

    .sidebar-history {
      margin-top: 30px;
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 10px;
      padding-left: 12px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 50px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .history-item:hover { background: #E3E3E3; }

    /* ════ MAIN CONTENT ════ */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Header */
    .header {
      height: 72px; /* Slightly taller to accommodate bigger logo */
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); display: none;
      padding: 8px; border-radius: 50%;
    }
    .menu-toggle:hover { background: var(--bg-sidebar); }

    .brand-logo {
      height: 48px; /* Increased size for visibility */
      object-fit: contain;
    }

    .header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--brand-blue); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; object-fit: cover;
    }

    /* Scroll Area */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 100px 20px;
    }

    .content-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
    }

    /* Welcome Screen */
    .welcome-screen {
      margin-top: 10vh;
      width: 100%;
    }

    .greeting {
      font-size: 3.5rem;
      font-weight: 500;
      letter-spacing: -1px;
      line-height: 1.2;
      background: var(--gemini-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 400% 100%;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 3.5rem;
      font-weight: 500;
      letter-spacing: -1px;
      color: #C4C7C5;
      line-height: 1.2;
      margin-bottom: 40px;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .suggestion-card {
      background: var(--bg-sidebar);
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 120px;
    }
    .suggestion-card:hover { background: #E3E3E3; }
    .suggestion-card p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.4; }
    .suggestion-card .icon { align-self: flex-end; background: #FFFFFF; padding: 8px; border-radius: 50%; display: flex; }

    /* Chat Area */
    .chat-container { display: none; flex-direction: column; gap: 24px; padding-top: 20px; }

    .message-row { display: flex; gap: 16px; max-width: 100%; }
    
    /* User Message */
    .message-row.user { justify-content: flex-end; }
    .msg-bubble.user {
      background: var(--bg-user-msg);
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 1rem;
      color: var(--text-primary);
      max-width: 80%;
      line-height: 1.5;
    }

    /* AI Message */
    .message-row.ai { align-items: flex-start; }
    .ai-avatar {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 50%; object-fit: contain;
    }
    .msg-bubble.ai {
      padding: 4px 0;
      font-size: 1rem;
      color: var(--text-primary);
      max-width: 100%;
      line-height: 1.6;
    }
    .msg-bubble.ai p { margin-bottom: 12px; }

    /* Input Area */
    .input-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, var(--bg-main) 30%);
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .input-box {
      width: 100%;
      max-width: 800px;
      background: var(--bg-input);
      border-radius: 32px;
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 12px;
    }

    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      padding: 8px 0;
    }
    .chat-input::placeholder { color: var(--text-secondary); }

    .action-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-primary); display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%; transition: background 0.2s;
    }
    .action-btn:hover { background: rgba(0,0,0,0.05); }

    .loader-inline {
      display: flex; gap: 4px; padding: 10px 0;
    }
    .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ════ RESPONSIVE ════ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
      .menu-toggle { display: block; }
      .greeting, .subtitle { font-size: 2.2rem; }
      .welcome-screen { margin-top: 5vh; }
      .input-wrapper { padding: 10px 15px 15px 15px; background: var(--bg-main); }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <button class="new-chat-btn" onclick="location.reload()">
      <i data-feather="plus" style="width: 20px; height: 20px;"></i>
      New chat
    </button>
    
    <div class="sidebar-history">
      <div class="sidebar-title">Recent</div>
      <div class="history-item">
        <i data-feather="message-square" style="width: 16px; height: 16px;"></i>
        PC running slow
      </div>
      <div class="history-item">
        <i data-feather="message-square" style="width: 16px; height: 16px;"></i>
        Screen replacement quote
      </div>
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle">
          <i data-feather="menu"></i>
        </button>
        <img src="https://i.postimg.cc/XqY9mvWs/4.png" alt="Rare Grade Tech" class="brand-logo">
      </div>
      <img id="header-avatar" class="header-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFFFFF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='background-color:%230611B1'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E">
    </header>

    <div class="scroll-area" id="mainScroll">
      <div class="content-container">
        
        <div class="welcome-screen" id="welcomeScreen">
          <h1 class="greeting">Hello, Katlego</h1>
          <h2 class="subtitle">How can I help with your PC today?</h2>
          
          <div class="suggestions-grid">
            <div class="suggestion-card" onclick="setPrompt('My computer is running very slow and freezing. How can I fix this?')">
              <p>Troubleshoot a slow or freezing computer</p>
              <div class="icon"><i data-feather="cpu" style="width:18px;height:18px;color:#4285f4;"></i></div>
            </div>
            <div class="suggestion-card" onclick="setPrompt('I need a quote to replace a shattered laptop screen.')">
              <p>Get a quote for a laptop screen replacement</p>
              <div class="icon"><i data-feather="monitor" style="width:18px;height:18px;color:#d96570;"></i></div>
            </div>
            <div class="suggestion-card" onclick="setPrompt('My laptop keeps turning off randomly. What could be the issue?')">
              <p>Diagnose sudden power or battery issues</p>
              <div class="icon"><i data-feather="battery-charging" style="width:18px;height:18px;color:#fbbc04;"></i></div>
            </div>
            <div class="suggestion-card" onclick="setPrompt('How do I remove a virus or malware from my Windows PC?')">
              <p>Help removing viruses and malware</p>
              <div class="icon"><i data-feather="shield" style="width:18px;height:18px;color:#34a853;"></i></div>
            </div>
          </div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

      </div>
    </div>

    <div class="input-wrapper">
      <div class="input-box">
        <input type="text" class="chat-input" id="userInput" placeholder="Ask about computer repairs or support here" autocomplete="off" />
        <button class="action-btn" id="sendBtn">
          <i data-feather="send" style="width:20px;height:20px;"></i>
        </button>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config.js";

    // Initialize Icons
    feather.replace();

    // UI Logic
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const mainScroll = document.getElementById('mainScroll');

    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });

    // --- FIREBASE CONFIG (Restored from Original) ---
    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      projectId: "fire-b-a8878",
      databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const remoteConfig = getRemoteConfig(app);
    remoteConfig.settings.minimumFetchIntervalMillis = 0;

    // --- USER PROFILE LOAD ---
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFFFFF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='background-color:%230611B1'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E";

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const snap = await get(ref(db, `users/${user.uid}`));
          if (snap.exists() && snap.val().photoURL) {
            document.getElementById('header-avatar').src = snap.val().photoURL;
          }
        } catch(e) { console.error("Avatar load error", e); }
      }
      // Note: Redirect to signup.html temporarily disabled to allow testing of UI
      // else { window.location.href = 'signup.html'; }
    });

    // --- API KEYS ---
    const API_BASE = "https://api.x.ai/v1";
    let XAI_API_KEY = "";

    async function loadKey() {
      try {
        await fetchAndActivate(remoteConfig);
        XAI_API_KEY = getValue(remoteConfig, 'xai_api_key').asString();
      } catch (e) { console.error("Key Load Error", e); }
    }
    loadKey();

    // --- System Prompt ---
    window.chatHistory = [
        { 
            role: "system", 
            content: `You are Rare Grade Tech AI, an expert technical support and IT repair consultant. 
            CRITICAL INSTRUCTION: You exclusively handle computer-related technical support, software troubleshooting, and hardware repair quotes for PCs, laptops, and computer peripherals. 
            If a user asks about ANYTHING else that is not related to computers (e.g., phones, cars, general knowledge, math, cooking, non-PC programming, etc.), you MUST politely decline to answer and instruct them to call the company support number: +27 0800 123 456. Do not attempt to answer non-computer related questions.`
        }
    ];

    window.activateChat = function() { 
        welcomeScreen.style.display = 'none'; 
        chatContainer.style.display = 'flex'; 
    };
    
    window.setPrompt = function(text) { 
        userInput.value = text; 
        window.handleSend(); 
    };

    window.escapeHtml = function(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    };

    window.formatChatText = function(text) {
        let formatted = window.escapeHtml(text);
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    };

    window.handleSend = async function() {
      const prompt = userInput.value.trim();
      if (!prompt || !XAI_API_KEY) return;

      activateChat();
      
      // Render User Message
      chatContainer.innerHTML += `
        <div class="message-row user">
            <div class="msg-bubble user">${window.escapeHtml(prompt)}</div>
        </div>`;
      
      // Render Loading State
      const loaderId = 'loader-' + Date.now();
      chatContainer.innerHTML += `
        <div class="message-row ai" id="${loaderId}">
            <img src="https://i.postimg.cc/XqY9mvWs/4.png" class="ai-avatar" alt="AI">
            <div class="msg-bubble ai">
                <div class="loader-inline">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        </div>`;
      
      userInput.value = '';
      mainScroll.scrollTop = mainScroll.scrollHeight;

      try {
        chatHistory.push({ role: "user", content: prompt });
        
        const res = await fetch(`${API_BASE}/chat/completions`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${XAI_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "grok-4-1-fast-reasoning", 
                messages: chatHistory
            })
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        
        document.getElementById(loaderId).remove();

        const aiMessage = data.choices[0].message.content;
        chatHistory.push({ role: "assistant", content: aiMessage });

        chatContainer.innerHTML += `
          <div class="message-row ai">
            <img src="https://i.postimg.cc/XqY9mvWs/4.png" class="ai-avatar" alt="AI">
            <div class="msg-bubble ai">${window.formatChatText(aiMessage)}</div>
          </div>`;

      } catch (err) {
        if(document.getElementById(loaderId)) document.getElementById(loaderId).remove();
        chatContainer.innerHTML += `
          <div class="message-row ai">
            <img src="https://i.postimg.cc/XqY9mvWs/4.png" class="ai-avatar" alt="AI">
            <div class="msg-bubble ai" style="color: var(--brand-red);">Connection Error: ${err.message}</div>
          </div>`;
      }
      mainScroll.scrollTop = mainScroll.scrollHeight;
    };

    sendBtn.onclick = window.handleSend;
    userInput.onkeypress = e => { if(e.key === 'Enter') window.handleSend(); };
  </script>
</body>
</html>
