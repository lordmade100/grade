<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rare Grade Tech — Consultant Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    :root {
      --bg: #F0F4F9; --bg-card: #FFFFFF; --bg-input: #F0F4F9;
      --text: #1F1F1F; --text-2: #444746; --text-muted: #8E918F;
      --border: #E3E3E3; --blue: #0611B1; --green: #34a853; --red: #E63946;
      --yellow: #fbbc04; --shadow: rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --bg: #1A1A1A; --bg-card: #242424; --bg-input: #2C2C2C;
      --text: #E3E3E3; --text-2: #B4B4B4; --text-muted: #666;
      --border: #3A3A3A; --blue: #4285f4; --shadow: rgba(0,0,0,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* Auth Screen */
    .auth-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-card { background:var(--bg-card); border-radius:24px; padding:40px 32px; max-width:400px; width:100%; text-align:center; box-shadow:0 8px 32px var(--shadow); }
    .auth-card img { height:56px; margin-bottom:24px; object-fit:contain; }
    .auth-card h1 { font-size:1.5rem; font-weight:700; margin-bottom:8px; }
    .auth-card p { font-size:0.9rem; color:var(--text-2); margin-bottom:28px; }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:14px; background:var(--bg-card); border:1px solid var(--border); border-radius:50px; font-family:inherit; font-size:1rem; font-weight:500; cursor:pointer; color:var(--text); transition:background 0.2s; }
    .google-btn:hover { background:var(--bg); }
    .google-btn img { width:22px; }

    /* Dashboard layout */
    .dashboard { display:none; flex:1; flex-direction:column; }
    .topbar { height:64px; background:var(--bg-card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .topbar-left img { height:36px; object-fit:contain; }
    .topbar-title { font-size:1rem; font-weight:700; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .consultant-info { display:flex; align-items:center; gap:10px; font-size:0.88rem; }
    .consultant-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; background:var(--blue); }
    .status-pill { display:flex; align-items:center; gap:6px; background:rgba(52,168,83,0.12); border:1px solid rgba(52,168,83,0.25); border-radius:50px; padding:5px 12px; font-size:0.78rem; font-weight:600; color:var(--green); cursor:pointer; }
    .status-dot-pill { width:8px; height:8px; border-radius:50%; background:var(--green); }
    .icon-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.2s,color 0.2s; }
    .icon-btn:hover { background:var(--bg); color:var(--text); }

    /* Main grid */
    .main-grid { display:grid; grid-template-columns:340px 1fr; flex:1; height:calc(100vh - 64px); overflow:hidden; }

    /* Queue panel */
    .queue-panel { background:var(--bg-card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .queue-header { padding:20px 20px 12px; border-bottom:1px solid var(--border); }
    .queue-header h2 { font-size:1rem; font-weight:700; margin-bottom:4px; }
    .queue-tabs { display:flex; gap:4px; margin-top:12px; }
    .q-tab { flex:1; padding:7px 0; border:none; border-radius:10px; font-family:inherit; font-size:0.82rem; font-weight:600; cursor:pointer; color:var(--text-muted); background:transparent; transition:all 0.2s; position:relative; }
    .q-tab.active { background:var(--bg); color:var(--text); }
    .q-tab-badge { position:absolute; top:-4px; right:6px; background:var(--red); color:white; border-radius:50%; width:18px; height:18px; font-size:0.68rem; display:none; align-items:center; justify-content:center; font-weight:700; }
    .q-tab-badge.show { display:flex; animation:badgePop 0.3s cubic-bezier(0.16,1,0.3,1); }
    @keyframes badgePop { from{transform:scale(0)}to{transform:scale(1)} }
    .queue-list { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .queue-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-muted); text-align:center; padding:40px; }
    .queue-empty svg { opacity:0.3; }
    .queue-empty p { font-size:0.88rem; }

    /* Queue card */
    .queue-card { background:var(--bg); border:1.5px solid var(--border); border-radius:16px; padding:14px 16px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
    .queue-card:hover { border-color:var(--blue); box-shadow:0 2px 12px var(--shadow); }
    .queue-card.selected { border-color:var(--blue); background:rgba(6,17,177,0.04); }
    .queue-card.waiting::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--yellow); border-radius:3px 0 0 3px; }
    .queue-card.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green); border-radius:3px 0 0 3px; }
    .queue-card.closed::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--text-muted); border-radius:3px 0 0 3px; }
    .qc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .qc-name { font-size:0.92rem; font-weight:700; color:var(--text); }
    .qc-time { font-size:0.72rem; color:var(--text-muted); }
    .qc-email { font-size:0.78rem; color:var(--text-muted); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qc-status { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:50px; font-size:0.72rem; font-weight:700; text-transform:uppercase; }
    .qc-status.waiting { background:rgba(251,188,4,0.12); color:#b8860b; }
    .qc-status.active  { background:rgba(52,168,83,0.12); color:var(--green); }
    .qc-status.closed  { background:var(--bg-input); color:var(--text-muted); }
    .qc-last-msg { font-size:0.8rem; color:var(--text-2); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qc-unread { position:absolute; top:14px; right:14px; background:var(--blue); color:white; border-radius:50%; width:20px; height:20px; font-size:0.7rem; font-weight:700; display:none; align-items:center; justify-content:center; }
    .qc-unread.show { display:flex; }

    /* Chat panel */
    .chat-panel { display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .chat-empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-muted); text-align:center; }
    .chat-empty-state svg { opacity:0.2; }

    /* Active chat header */
    .chat-top { background:var(--bg-card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .chat-user-info { display:flex; align-items:center; gap:12px; }
    .chat-user-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#0611B1,#4285f4); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1rem; flex-shrink:0; }
    .chat-user-name { font-size:1rem; font-weight:700; }
    .chat-user-email { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
    .chat-actions { display:flex; gap:8px; }
    .chat-action-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:50px; border:none; font-family:inherit; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-accept { background:linear-gradient(135deg,#34a853,#2d9245); color:white; box-shadow:0 2px 8px rgba(52,168,83,0.3); }
    .btn-accept:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(52,168,83,0.4); }
    .btn-end { background:rgba(230,57,70,0.1); color:var(--red); border:1px solid rgba(230,57,70,0.2); }
    .btn-end:hover { background:rgba(230,57,70,0.18); }

    /* Messages */
    .chat-messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
    .lc-msg-row { display:flex; gap:8px; align-items:flex-end; }
    .lc-msg-row.user { justify-content:flex-end; }
    .lc-msg-row.consultant { justify-content:flex-start; }
    .msg-avatar-sm { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#0611B1,#4285f4); display:flex; align-items:center; justify-content:center; color:white; font-size:0.7rem; font-weight:700; flex-shrink:0; }
    .lc-bubble { max-width:72%; padding:10px 14px; border-radius:18px; font-size:0.92rem; line-height:1.5; word-break:break-word; animation:bubbleIn 0.2s cubic-bezier(0.16,1,0.3,1); }
    @keyframes bubbleIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }
    .lc-bubble.user { background:linear-gradient(135deg,#0611B1,#4285f4); color:white; border-radius:18px 18px 4px 18px; }
    .lc-bubble.consultant { background:var(--bg-card); color:var(--text); border:1px solid var(--border); border-radius:18px 18px 18px 4px; }
    .bubble-time { font-size:0.68rem; color:var(--text-muted); margin-top:3px; }
    .msg-row-user .bubble-time { text-align:right; }
    .lc-system-msg { text-align:center; font-size:0.75rem; color:var(--text-muted); }
    .lc-system-msg span { background:var(--bg-input); border-radius:50px; padding:4px 12px; display:inline-block; }

    /* Typing indicator */
    .typing-row { display:none; align-items:flex-end; gap:8px; }
    .typing-row.show { display:flex; }
    .typing-bubble { background:var(--bg-card); border:1px solid var(--border); border-radius:18px 18px 18px 4px; padding:10px 14px; display:flex; gap:4px; }
    .typing-dot { width:6px; height:6px; background:var(--text-muted); border-radius:50%; animation:tdot 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s}.typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes tdot { 0%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-4px);opacity:1} }

    /* Input */
    .chat-input-area { background:var(--bg-card); border-top:1px solid var(--border); padding:16px 24px; flex-shrink:0; }
    .quick-replies { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .qr-btn { background:var(--bg); border:1px solid var(--border); border-radius:50px; padding:5px 12px; font-family:inherit; font-size:0.78rem; cursor:pointer; color:var(--text-2); transition:all 0.2s; white-space:nowrap; }
    .qr-btn:hover { border-color:var(--blue); color:var(--blue); background:rgba(6,17,177,0.05); }
    .input-row { display:flex; gap:10px; align-items:flex-end; }
    .consultant-input { flex:1; background:var(--bg-input); border:1px solid var(--border); border-radius:20px; padding:10px 16px; font-family:inherit; font-size:0.95rem; color:var(--text); outline:none; resize:none; min-height:42px; max-height:120px; line-height:1.5; transition:border-color 0.2s; }
    .consultant-input:focus { border-color:var(--blue); }
    .consultant-input::placeholder { color:var(--text-muted); }
    .send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#0611B1,#4285f4); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; flex-shrink:0; }
    .send-btn:hover { transform:scale(1.06); }
    .send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

    /* Info sidebar on right (chat details) */
    .chat-top-banner {
      padding: 10px 24px;
      background: rgba(52,168,83,0.08);
      border-bottom: 1px solid rgba(52,168,83,0.2);
      font-size: 0.82rem;
      color: var(--green);
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .chat-top-banner.show { display: flex; }

    /* Dialog */
    .dialog-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s; }
    .dialog-box { background:var(--bg-card);padding:24px;border-radius:20px;width:90%;max-width:340px;text-align:center;transform:scale(0.95);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 10px 30px rgba(0,0,0,0.2); }
    .dialog-box h3 { font-size:1.2rem;font-weight:700;margin-bottom:8px; }
    .dialog-box p { font-size:0.9rem;color:var(--text-2);margin-bottom:20px;line-height:1.5; }
    .dialog-btns { display:flex;gap:10px; }
    .d-btn { flex:1;padding:10px;border-radius:50px;border:none;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer; }
    .d-btn.sec { background:var(--bg-input);color:var(--text); }
    .d-btn.red { background:var(--red);color:white; }
    .d-btn.blue { background:var(--blue);color:white; }

    /* Notification toast */
    .toast { position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px 18px;box-shadow:0 8px 24px var(--shadow);font-size:0.88rem;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);max-width:320px; }
    .toast.show { transform:translateY(0);opacity:1; }
    .toast-icon { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .toast-icon.green { background:rgba(52,168,83,0.15);color:var(--green); }
    .toast-icon.blue { background:rgba(6,17,177,0.1);color:var(--blue); }

    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; }
      .chat-panel { display: none; }
      .chat-panel.mobile-show { display: flex; position: fixed; inset: 0; z-index: 500; }
    }
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:99px}
  </style>
</head>
<body>

<!-- Auth Screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <img src="https://i.postimg.cc/tRMK3mNK/Steward-logo.png" alt="Logo">
    <h1>Consultant Portal</h1>
    <p>Sign in with your Rare Grade Tech Google account to access the live chat dashboard.</p>
    <button class="google-btn" id="signInBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Continue with Google
    </button>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <img src="https://i.postimg.cc/tRMK3mNK/Steward-logo.png" alt="Logo">
      <span class="topbar-title">Consultant Dashboard</span>
    </div>
    <div class="topbar-right">
      <div class="status-pill" id="statusPill">
        <span class="status-dot-pill"></span> Online
      </div>
      <div class="consultant-info">
        <img class="consultant-avatar" id="consultantAvatar" src="" alt="">
        <span id="consultantName" style="font-weight:600;font-size:0.88rem;"></span>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme"><i data-feather="moon" id="themeIcon"></i></button>
      <button class="icon-btn" id="signOutBtn" title="Sign Out"><i data-feather="log-out"></i></button>
    </div>
  </div>

  <div class="main-grid">
    <!-- Left: queue -->
    <div class="queue-panel">
      <div class="queue-header">
        <h2>Live Chats</h2>
        <div class="queue-tabs">
          <button class="q-tab active" data-tab="waiting" onclick="switchTab('waiting')">
            Queue <span class="q-tab-badge" id="waitingBadge"></span>
          </button>
          <button class="q-tab" data-tab="active" onclick="switchTab('active')">
            Active <span class="q-tab-badge" id="activeBadge"></span>
          </button>
          <button class="q-tab" data-tab="closed" onclick="switchTab('closed')">Closed</button>
        </div>
      </div>
      <div class="queue-list" id="queueList">
        <div class="queue-empty">
          <i data-feather="inbox" style="width:48px;height:48px;"></i>
          <p>No chats yet.<br>Waiting for customers...</p>
        </div>
      </div>
    </div>

    <!-- Right: chat -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty-state" id="chatEmptyState">
        <i data-feather="message-circle" style="width:64px;height:64px;"></i>
        <p style="font-size:0.95rem;">Select a chat from the queue to get started</p>
      </div>

      <!-- Active chat view (hidden until selected) -->
      <div id="activeChatView" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="chat-top" id="chatTop">
          <div class="chat-user-info">
            <div class="chat-user-avatar" id="chatUserAvatar">?</div>
            <div>
              <div class="chat-user-name" id="chatUserName">—</div>
              <div class="chat-user-email" id="chatUserEmail">—</div>
            </div>
          </div>
          <div class="chat-actions" id="chatActions"></div>
        </div>
        <div class="chat-top-banner" id="chatTopBanner">
          <i data-feather="check-circle" style="width:16px;height:16px;"></i>
          <span id="chatBannerText">Chat active</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="typing-row" id="userTypingRow">
          <div class="msg-avatar-sm">U</div>
          <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
        </div>
        <div class="chat-input-area" id="chatInputArea" style="display:none;">
          <div class="quick-replies">
            <button class="qr-btn" onclick="useQuickReply('Hello! How can I help you today?')">👋 Greet</button>
            <button class="qr-btn" onclick="useQuickReply('Please give me a moment to look into that for you.')">⏱ One moment</button>
            <button class="qr-btn" onclick="useQuickReply('Thank you for contacting Rare Grade Tech. Is there anything else I can help you with?')">✅ Wrap up</button>
            <button class="qr-btn" onclick="useQuickReply('I\\'ll need to escalate this to a senior technician. They will reach out to you shortly.')">🔺 Escalate</button>
          </div>
          <div class="input-row">
            <textarea class="consultant-input" id="consultantInput" placeholder="Type a reply..." rows="1"></textarea>
            <button class="send-btn" id="consultantSendBtn"><i data-feather="send" style="width:16px;height:16px;"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Dialog -->
<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box" id="dialogBox">
    <h3 id="dialogTitle"></h3>
    <p id="dialogMsg"></p>
    <div class="dialog-btns" id="dialogBtns"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon green" id="toastIcon"><i data-feather="bell" style="width:16px;height:16px;"></i></div>
  <span id="toastMsg">New chat request</span>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, onValue, onChildAdded, onChildChanged, push, set, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain: "fire-b-a8878.firebaseapp.com",
    projectId: "fire-b-a8878",
    databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
    appId: "1:658673187627:web:6e4c29af661785f0afa36e"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  feather.replace();

  // ── Theme ──────────────────────────────────────────────────────
  const themeBtn = document.getElementById('themeBtn');
  const themeIcon = document.getElementById('themeIcon');
  let currentTheme = localStorage.getItem('admin_theme') || 'light';
  function applyTheme(t) { document.documentElement.setAttribute('data-theme',t); themeIcon.setAttribute('data-feather',t==='dark'?'sun':'moon'); feather.replace(); }
  applyTheme(currentTheme);
  themeBtn.addEventListener('click',()=>{ currentTheme=currentTheme==='dark'?'light':'dark'; localStorage.setItem('admin_theme',currentTheme); applyTheme(currentTheme); });

  // ── Dialog ─────────────────────────────────────────────────────
  const dialogOverlay = document.getElementById('dialogOverlay');
  const dialogBox = document.getElementById('dialogBox');
  function showDialog(title, msg, btns) {
    document.getElementById('dialogTitle').textContent=title;
    document.getElementById('dialogMsg').textContent=msg;
    const db2=document.getElementById('dialogBtns'); db2.innerHTML='';
    btns.forEach(b=>{ const el=document.createElement('button'); el.className=`d-btn ${b.cls||'sec'}`; el.textContent=b.text; el.onclick=()=>{ closeDialog(); if(b.fn)b.fn(); }; db2.appendChild(el); });
    dialogOverlay.style.display='flex';
    setTimeout(()=>{ dialogOverlay.style.opacity='1'; dialogBox.style.transform='scale(1)'; },10);
  }
  function closeDialog() { dialogOverlay.style.opacity='0'; dialogBox.style.transform='scale(0.95)'; setTimeout(()=>dialogOverlay.style.display='none',300); }
  dialogOverlay.addEventListener('click',e=>{ if(e.target===dialogOverlay)closeDialog(); });

  // ── Toast ──────────────────────────────────────────────────────
  const toastEl = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  function showToast(msg, type='green') {
    toastMsg.textContent=msg;
    document.getElementById('toastIcon').className=`toast-icon ${type}`;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'),4000);
    if(Notification.permission==='granted') new Notification('Rare Grade Tech',{body:msg,icon:'https://i.postimg.cc/tRMK3mNK/Steward-logo.png'});
  }

  // ── Auth ───────────────────────────────────────────────────────
  let currentConsultant = null;
  const authScreen = document.getElementById('authScreen');
  const dashboard = document.getElementById('dashboard');

  document.getElementById('signInBtn').addEventListener('click', async ()=>{
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e){ alert('Sign in failed: '+e.message); }
  });
  document.getElementById('signOutBtn').addEventListener('click',()=>{
    showDialog("Sign Out","Are you sure?",[
      {text:"Cancel"},{text:"Sign Out",cls:'red',fn:()=>signOut(auth)}
    ]);
  });

  onAuthStateChanged(auth, user=>{
    currentConsultant=user;
    if(user){
      authScreen.style.display='none';
      dashboard.style.display='flex';
      document.getElementById('consultantAvatar').src=user.photoURL||'';
      document.getElementById('consultantName').textContent=user.displayName?.split(' ')[0]||'Agent';
      initDashboard();
      if(Notification.permission==='default') Notification.requestPermission();
    } else {
      authScreen.style.display='flex';
      dashboard.style.display='none';
    }
  });

  // ── State ──────────────────────────────────────────────────────
  let allChats = {};      // chatId → chatData
  let selectedChatId = null;
  let currentTab = 'waiting';
  let chatMsgsListener = null;
  let chatTypingListener = null;
  let seenChatIds = new Set();

  // ── Init dashboard ─────────────────────────────────────────────
  function initDashboard() {
    // Listen to ALL live chats in real-time
    onValue(ref(db,'livechats'), snap=>{
      allChats={};
      if(snap.exists()) snap.forEach(c=>{ allChats[c.key]=c.val(); });
      renderQueue();
      updateBadges();
    });

    // New chat notifications
    onChildAdded(ref(db,'livechats'), snap=>{
      const id=snap.key; const data=snap.val();
      if(!seenChatIds.has(id)){
        seenChatIds.add(id);
        if(data.status==='waiting'){
          showToast(`New chat request from ${data.userName||'a customer'}`, 'blue');
          if(navigator.vibrate) navigator.vibrate([200,100,200]);
        }
      }
    });

    // Chat status changes
    onChildChanged(ref(db,'livechats'), snap=>{
      const id=snap.key; const data=snap.val();
      allChats[id]=data;
      renderQueue();
      updateBadges();
      // If currently viewing this chat, update header
      if(selectedChatId===id) renderChatHeader(id, data);
    });
  }

  // ── Tab switching ──────────────────────────────────────────────
  window.switchTab = function(tab){
    currentTab=tab;
    document.querySelectorAll('.q-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
    renderQueue();
  };

  function updateBadges() {
    const waiting=Object.values(allChats).filter(c=>c.status==='waiting').length;
    const active=Object.values(allChats).filter(c=>c.status==='active'&&c.consultantId===currentConsultant?.uid).length;
    const wb=document.getElementById('waitingBadge'); wb.textContent=waiting; wb.classList.toggle('show',waiting>0);
    const ab=document.getElementById('activeBadge'); ab.textContent=active; ab.classList.toggle('show',active>0);
  }

  // ── Render queue list ──────────────────────────────────────────
  function renderQueue() {
    const list = document.getElementById('queueList');
    const filtered = Object.entries(allChats).filter(([id,c])=>{
      if(currentTab==='waiting') return c.status==='waiting';
      if(currentTab==='active') return c.status==='active';
      if(currentTab==='closed') return c.status==='closed';
    }).sort(([,a],[,b])=>(b.createdAt||0)-(a.createdAt||0));

    if(!filtered.length){
      list.innerHTML=`<div class="queue-empty"><i data-feather="inbox" style="width:48px;height:48px;"></i><p>${currentTab==='waiting'?'No customers waiting.':currentTab==='active'?'No active chats.':'No closed chats.'}</p></div>`;
      feather.replace(); return;
    }

    list.innerHTML='';
    filtered.forEach(([id,c])=>{
      const div=document.createElement('div');
      div.className=`queue-card ${c.status}${selectedChatId===id?' selected':''}`;
      div.onclick=()=>selectChat(id);
      const ts=c.createdAt?formatTime(c.createdAt):'';
      const name=c.userName||'Guest';
      div.innerHTML=`
        <div class="qc-top">
          <span class="qc-name">${esc(name)}</span>
          <span class="qc-time">${ts}</span>
        </div>
        <div class="qc-email">${esc(c.userEmail||'No email')}</div>
        <span class="qc-status ${c.status}">${c.status}</span>
        ${c.lastMessage?`<div class="qc-last-msg">${esc(c.lastMessage)}</div>`:''}
      `;
      list.appendChild(div);
    });
    feather.replace();
  }

  // ── Select / open a chat ───────────────────────────────────────
  async function selectChat(chatId) {
    selectedChatId=chatId;
    renderQueue(); // re-render to show selected state

    const data=allChats[chatId]||{};
    document.getElementById('chatEmptyState').style.display='none';
    const acv=document.getElementById('activeChatView');
    acv.style.display='flex';

    // Clear messages & stop old listeners
    stopChatListeners();
    document.getElementById('chatMessages').innerHTML='';

    renderChatHeader(chatId,data);

    // Listen for messages
    chatMsgsListener = onChildAdded(ref(db,`livechats/${chatId}/messages`), snap=>{
      const msg=snap.val(); if(!msg) return;
      appendMessage(msg.sender, msg.senderName, msg.text, msg.timestamp);
      // Mark as read
      if(msg.sender==='user'&&!msg.read&&data.status==='active') {
        update(ref(db,`livechats/${chatId}/messages/${snap.key}`),{read:true}).catch(()=>{});
      }
    });

    // Listen for user typing
    chatTypingListener = onValue(ref(db,`livechats/${chatId}/userTyping`), snap=>{
      document.getElementById('userTypingRow').classList.toggle('show', !!snap.val());
    });
  }

  function renderChatHeader(chatId, data) {
    const name=data.userName||'Guest';
    document.getElementById('chatUserName').textContent=name;
    document.getElementById('chatUserEmail').textContent=data.userEmail||'No email';
    document.getElementById('chatUserAvatar').textContent=name[0]?.toUpperCase()||'?';

    const banner=document.getElementById('chatTopBanner');
    const actions=document.getElementById('chatActions');
    const inputArea=document.getElementById('chatInputArea');
    const bannerText=document.getElementById('chatBannerText');

    actions.innerHTML='';
    inputArea.style.display='none';
    banner.classList.remove('show');

    if(data.status==='waiting'){
      const btn=document.createElement('button');
      btn.className='chat-action-btn btn-accept';
      btn.innerHTML='<i data-feather="phone-incoming" style="width:16px;height:16px;"></i> Accept Chat';
      btn.onclick=()=>acceptChat(chatId,data);
      actions.appendChild(btn);
    } else if(data.status==='active'){
      if(data.consultantId===currentConsultant?.uid){
        bannerText.textContent=`You accepted this chat`;
        banner.classList.add('show');
        inputArea.style.display='block';
        const btn=document.createElement('button');
        btn.className='chat-action-btn btn-end';
        btn.innerHTML='<i data-feather="phone-off" style="width:14px;height:14px;"></i> End Chat';
        btn.onclick=()=>endChat(chatId);
        actions.appendChild(btn);
      } else {
        bannerText.textContent=`Handled by ${data.consultantName||'another agent'}`;
        banner.classList.add('show');
      }
    } else if(data.status==='closed'){
      bannerText.textContent=`Chat ended${data.rating?` · Rated: ${data.rating==='good'?'👍':' 👎'}`:''}`;
      banner.classList.add('show');
    }
    feather.replace();
  }

  // ── Accept chat ────────────────────────────────────────────────
  async function acceptChat(chatId, data) {
    try {
      await update(ref(db,`livechats/${chatId}`),{
        status: 'active',
        consultantId: currentConsultant.uid,
        consultantName: currentConsultant.displayName||'Agent',
        consultantPhoto: currentConsultant.photoURL||'',
        acceptedAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      showToast(`You accepted ${data.userName}'s chat`, 'green');
    } catch(e) { alert('Failed to accept: '+e.message); }
  }

  // ── End chat ───────────────────────────────────────────────────
  function endChat(chatId) {
    showDialog("End Chat","Are you sure you want to end this chat session?",[
      {text:"Keep Open"},
      {text:"End Chat",cls:'red',fn:async()=>{
        try {
          await update(ref(db,`livechats/${chatId}`),{status:'closed',closedBy:'consultant',closedAt:serverTimestamp(),updatedAt:serverTimestamp()});
          // Send final message
          await push(ref(db,`livechats/${chatId}/messages`),{sender:'consultant',senderName:currentConsultant.displayName||'Agent',text:'This chat has been closed. Thank you for contacting Rare Grade Tech!',timestamp:Date.now(),read:false});
          showToast('Chat ended','green');
        } catch(e){ alert('Error: '+e.message); }
      }}
    ]);
  }

  // ── Send consultant message ────────────────────────────────────
  const consultantInput = document.getElementById('consultantInput');
  const consultantSendBtn = document.getElementById('consultantSendBtn');

  async function sendConsultantMsg() {
    const text=consultantInput.value.trim();
    if(!text||!selectedChatId) return;
    consultantInput.value=''; consultantInput.style.height='auto';
    consultantSendBtn.disabled=true;
    try {
      await push(ref(db,`livechats/${selectedChatId}/messages`),{
        sender:'consultant',
        senderName:currentConsultant.displayName||'Agent',
        text,timestamp:Date.now(),read:false
      });
      await update(ref(db,`livechats/${selectedChatId}`),{lastMessage:text,updatedAt:serverTimestamp()});
      // Set consultant typing to false
      await set(ref(db,`livechats/${selectedChatId}/consultantTyping`),false);
    } catch(e){ console.error(e); }
    consultantSendBtn.disabled=false;
  }

  consultantSendBtn.addEventListener('click',sendConsultantMsg);
  consultantInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendConsultantMsg();} });
  consultantInput.addEventListener('input',function(){
    this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';
    if(selectedChatId){
      set(ref(db,`livechats/${selectedChatId}/consultantTyping`),true);
      clearTimeout(window._cTypingTimer);
      window._cTypingTimer=setTimeout(()=>{ if(selectedChatId)set(ref(db,`livechats/${selectedChatId}/consultantTyping`),false); },2000);
    }
  });

  // ── Quick replies ──────────────────────────────────────────────
  window.useQuickReply = function(text) { consultantInput.value=text; consultantInput.focus(); };

  // ── Append message ─────────────────────────────────────────────
  function appendMessage(sender, senderName, text, timestamp) {
    const isUser=sender==='user';
    const container=document.getElementById('chatMessages');
    const div=document.createElement('div');
    div.className=`lc-msg-row ${isUser?'user':'consultant'}`;
    div.innerHTML=`
      ${!isUser?`<div class="msg-avatar-sm">${(senderName||'A')[0].toUpperCase()}</div>`:''}
      <div>
        <div class="lc-bubble ${isUser?'user':'consultant'}">${esc(text)}</div>
        <div class="bubble-time">${formatTime(timestamp||Date.now())}</div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop=container.scrollHeight;
  }

  // ── Stop listeners ─────────────────────────────────────────────
  function stopChatListeners() {
    // Firebase onChildAdded/onValue listeners are not easily detachable without refs,
    // so we use a flag approach. In production use off() with stored listener refs.
    chatMsgsListener=null; chatTypingListener=null;
  }

  // ── Helpers ────────────────────────────────────────────────────
  function esc(t='') { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatTime(ts) {
    if(!ts) return '';
    const d=new Date(ts);
    const now=new Date();
    const isToday=d.toDateString()===now.toDateString();
    if(isToday) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
</script>
</body>
</html>
