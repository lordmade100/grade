<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rare Grade Tech • Support & Quotes</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet"/>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* ══════════════════════════════════════════
       THEME SYSTEM (Rare Grade Tech Poster Theme)
    ══════════════════════════════════════════ */
    :root {
        --brand-blue: #0611B1; /* Deep Royal Blue from the poster */
        --brand-red: #E63946;  /* Red from "IMAGINATION TO REALITY" */
        --background: #F4F6FA; /* Soft off-white to make the white cards pop */
        --surface: #FFFFFF;
        --surface2: #Eef2F6;
        --border: #D1D5DB;
        --text-primary: #0F172A;
        --text-blue: #0611B1;
        --text-muted: #64748B;
        --shadow-sm: 0 2px 4px rgba(6, 17, 177, 0.05);
        --shadow-md: 0 4px 12px rgba(6, 17, 177, 0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--background);
      color: var(--text-primary);
      height: 100svh; 
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .app-header {
      background: var(--surface);
      height: 64px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--brand-blue);
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }
    
    .app-title {
      font-weight: 800;
      letter-spacing: 1px;
      font-size: 1.1rem;
      color: var(--brand-blue);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-title span {
      color: var(--brand-red);
    }

    .icon-btn {
      background: none; border: none; color: var(--brand-blue);
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    }

    /* Main Content */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* Welcome Screen */
    .welcome-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 20px; text-align: center;
    }

    .brand-logo-large {
      width: 80px;
      height: 80px;
      color: var(--brand-blue);
      margin-bottom: 16px;
    }

    .brand-title {
      font-size: 2.2rem; 
      font-weight: 800; 
      color: var(--brand-blue);
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand-slogan {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--brand-red);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    .suggestions-container {
      width: 100%; max-width: 450px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }

    .suggestion-chip {
      background: var(--surface); 
      border: 1px solid var(--border);
      padding: 16px; 
      border-radius: 12px; 
      font-size: 0.9rem;
      text-align: left; 
      cursor: pointer; 
      transition: all 0.2s ease;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .suggestion-chip strong {
      color: var(--brand-blue);
      display: block;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }
    
    .suggestion-chip:active { 
      transform: scale(0.96); 
    }
    
    .suggestion-chip:hover {
      border-color: var(--brand-blue);
      box-shadow: var(--shadow-md);
    }

    /* Chat Elements */
    .chat-container { padding: 20px; display: none; flex-direction: column; gap: 20px; }

    .msg-bubble {
      max-width: 85%; padding: 14px 18px; border-radius: 18px;
      font-size: 0.95rem; line-height: 1.5; box-shadow: var(--shadow-sm);
    }

    .message-row { display: flex; flex-direction: column; }
    
    .message-row.user { align-items: flex-end; }
    .msg-bubble.user { 
        background: var(--brand-blue); 
        color: white; 
        border-radius: 18px 18px 4px 18px; 
    }

    .message-row.ai { align-items: flex-start; }
    .msg-bubble.ai { 
        background: var(--surface); 
        color: var(--text-primary); 
        border: 1px solid var(--border); 
        border-left: 4px solid var(--brand-red); /* Red accent line */
        border-radius: 18px 18px 18px 4px; 
    }

    /* Bottom Section */
    .bottom-section {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex; flex-direction: column;
    }

    /* Input Bar */
    .input-bar { padding: 15px 20px; }

    .input-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border-radius: 30px; padding: 6px 6px 6px 20px;
      border: 1px solid transparent; 
      transition: all 0.3s ease;
    }

    .input-box:focus-within {
        border-color: var(--brand-blue);
        background: var(--surface);
        box-shadow: var(--shadow-sm);
    }

    .chat-input {
      flex: 1; border: none; background: transparent; color: var(--text-primary);
      font-size: 1rem; outline: none; padding: 10px 0; font-family: inherit;
    }
    
    .chat-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--brand-blue); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; cursor: pointer;
    }

    .send-btn:hover {
        background: var(--brand-red);
    }

    /* Loading */
    .loader { display: flex; gap: 4px; padding: 15px; }
    .dot { width: 6px; height: 6px; background: var(--brand-blue); border-radius: 50%; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  </style>
</head>
<body>

  <header class="app-header">
    <button class="icon-btn" onclick="window.history.back()">
      <i data-feather="arrow-left"></i>
    </button>
    <div class="app-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 0-7.35 16.76l-.42.42a2 2 0 0 0 2.83 2.83l.42-.42A10 10 0 1 0 12 2z"></path>
            <path d="M12 8v4l3 3"></path>
        </svg>
        RARE GRADE <span>TECH</span>
    </div>
    <button class="icon-btn" onclick="window.location.href='profile.html'">
      <i data-feather="user"></i>
    </button>
  </header>

  <main class="main-content" id="mainScroll">
    <div class="welcome-screen" id="welcomeScreen">
      <svg class="brand-logo-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
        <circle cx="12" cy="12" r="2"></circle>
      </svg>
      
      <h1 class="brand-title">Rare Grade Tech</h1>
      <p class="brand-slogan">Imagination to Reality</p>
      
      <div class="suggestions-container">
        <div class="suggestion-chip" onclick="setPrompt('My laptop screen is completely shattered. Can I get a quote to fix it?')">
          <strong>Repair Quote</strong>
          Screen Replacement
        </div>
        <div class="suggestion-chip" onclick="setPrompt('My PC is running extremely slow and freezing. How can I troubleshoot this?')">
          <strong>Troubleshoot</strong>
          System Running Slow
        </div>
        <div class="suggestion-chip" onclick="setPrompt('I need help installing and configuring some new software for my business.')">
          <strong>IT Support</strong>
          Software Setup
        </div>
        <div class="suggestion-chip" onclick="setPrompt('My phone keeps dying at 30%. Do I need a new battery? How much would it cost?')">
          <strong>Hardware Issue</strong>
          Battery Diagnostics
        </div>
      </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>
  </main>

  <footer class="bottom-section">
    <div class="input-bar">
      <div class="input-box" id="inputBoxContainer">
        <input type="text" class="chat-input" id="userInput" placeholder="Describe your issue or request a quote..." autocomplete="off" />
        <button class="send-btn" id="sendBtn">
          <i data-feather="send" style="width:18px;height:18px;"></i>
        </button>
      </div>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config.js";

    // --- SETUP ICONS ---
    feather.replace();

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      projectId: "fire-b-a8878",
      databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const remoteConfig = getRemoteConfig(app);
    remoteConfig.settings.minimumFetchIntervalMillis = 0;

    // --- API KEYS ---
    const API_BASE = "https://api.x.ai/v1";
    let XAI_API_KEY = "";

    async function loadKey() {
      try {
        await fetchAndActivate(remoteConfig);
        XAI_API_KEY = getValue(remoteConfig, 'xai_api_key').asString();
      } catch (e) { console.error("Key Load Error", e); }
    }
    loadKey();

    // --- STATE & UI LOGIC ---
    window.chatHistory = [
        { 
            role: "system", 
            content: "You are Rare Grade Tech AI, an expert technical support and IT repair consultant. Your slogan is 'Imagination to Reality'. Your goal is to help clients troubleshoot basic technical software issues, and to provide professional, estimated quotes for hardware repairs or complex IT services. If a user asks for a repair quote, ensure you ask for the specific device make, model, and the exact nature of the issue before giving an estimated price. Keep your responses professional, incredibly helpful, clear, and concise." 
        }
    ];

    const els = {
      welcome: document.getElementById('welcomeScreen'),
      chat: document.getElementById('chatContainer'),
      input: document.getElementById('userInput'),
      send: document.getElementById('sendBtn'),
      scroll: document.getElementById('mainScroll')
    };

    window.activateChat = function() { 
        els.welcome.style.display = 'none'; 
        els.chat.style.display = 'flex'; 
    };
    
    window.setPrompt = function(text) { 
        els.input.value = text; 
        handleSend(); 
    };

    window.escapeHtml = function(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    };

    window.formatChatText = function(text) {
        let formatted = window.escapeHtml(text);
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    };

    window.handleSend = async function() {
      const prompt = els.input.value.trim();
      if (!prompt || !XAI_API_KEY) return;

      activateChat();
      els.chat.innerHTML += `<div class="message-row user"><div class="msg-bubble user">${window.escapeHtml(prompt)}</div></div>`;
      
      const loader = document.createElement('div');
      loader.className = 'loader';
      loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      els.chat.appendChild(loader);
      
      els.input.value = '';
      els.scroll.scrollTop = els.scroll.scrollHeight;

      try {
        chatHistory.push({ role: "user", content: prompt });
        
        const res = await fetch(`${API_BASE}/chat/completions`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${XAI_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "grok-4-1-fast-reasoning",
                messages: chatHistory
            })
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        loader.remove();

        const aiMessage = data.choices[0].message.content;
        chatHistory.push({ role: "assistant", content: aiMessage });

        els.chat.innerHTML += `
          <div class="message-row ai">
            <div class="msg-bubble ai">${window.formatChatText(aiMessage)}</div>
          </div>`;

      } catch (err) {
        loader.remove();
        els.chat.innerHTML += `<div class="message-row ai"><div class="msg-bubble ai" style="color: var(--brand-red); border-color: var(--brand-red);">Error: ${err.message}</div></div>`;
      }
      els.scroll.scrollTop = els.scroll.scrollHeight;
    };

    els.send.onclick = handleSend;
    els.input.onkeypress = e => { if(e.key === 'Enter') handleSend(); };
  </script>
</body>
</html>
